<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  /* one palette: desaturated, muted, all at the same "weight" */
  --bg:        #E4F2F4;   /* light aqua */
  --surface:   #D4ECEF;   /* soft teal */
  --white:     #F0FAFA;   /* card white, aqua tint */

  --rose:      #C4788A;   /* warm rose */
  --rose-soft: #F2E2E6;   /* pale rose fill */

  --gold:      #C9A24E;
  --gold-soft: #F5EDDA;   /* pale gold fill */

  --blue:      #4A9BAD;   /* teal blue */
  --blue-soft: #C8E8ED;   /* pale aqua */

  --ink:       #2C3540;
  --muted:     #7A8C99;
  --muted2:    #A8B8C4;

  --border:    rgba(92,133,164,0.15);
  --border2:   rgba(92,133,164,0.28);
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  position:relative; z-index:1;
  padding: 4.5rem 2rem 1.75rem;
  text-align:center;
}

.header-eyebrow {
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 1rem;
  font-weight: 400;
}

.header-title {
  font-family: 'Great Vibes', cursive;
  font-size: 3.8rem;
  line-height: 1.12;
  color: var(--ink);
  margin-bottom: 0.6rem;
  font-weight: 400;
  -webkit-text-stroke: 0.3px var(--ink);
}

.header-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.14em;
  color: var(--muted);
}

.hdr-line {
  display:flex; align-items:center; gap:0.75rem;
  justify-content:center;
  padding: 1.5rem 3rem 3rem;
  position:relative; z-index:1;
}
.hdr-line-bar {
  height: 1px; flex:1; max-width: 80px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}
.hdr-line-mark { font-size:0.7rem; color:var(--rose); opacity:0.8; }

/* ── SNAKE ── */
.snake-wrap { position:relative; padding-bottom:5rem; z-index:1; }
.snake-svg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; }

.snake-row { display:flex; align-items:center; height:115px; }
.snake-row.side-left  { justify-content:flex-start; padding-left:1.5rem; }
.snake-row.side-right { justify-content:flex-end;   padding-right:1.5rem; }

.node { display:flex; flex-direction:column; gap:0.45rem; cursor:pointer; user-select:none; }
.side-left  .node { align-items:flex-start; }
.side-right .node { align-items:flex-end; }

.node-pill {
  display:flex; align-items:center;
  padding:0.6rem 1.15rem;
  background: var(--white);
  border:1px solid var(--border2);
  border-radius:100px;
  box-shadow: 0 1px 6px rgba(44,53,64,0.08);
  transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
}
.node:hover .node-pill, .node:active .node-pill {
  background: var(--white);
  border-color: var(--rose);
  box-shadow: 0 4px 16px rgba(184,126,133,0.2), 0 0 0 3px rgba(184,126,133,0.08);
  transform: scale(1.05) translateY(-1px);
}

.pill-date {
  font-family:'Cormorant Garamond',serif;
  font-size:0.88rem; font-weight:400;
  color:var(--ink); letter-spacing:0.04em; white-space:nowrap;
  transition:color 0.22s;
}
.node:hover .pill-date { color: var(--rose); }

.node-label {
  font-size:1rem; font-weight:400;
  font-family:'Great Vibes',cursive;
  color:var(--muted); padding:0 0.45rem; white-space:nowrap;
}

/* ── OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(28,36,44,0.5);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  align-items:flex-end; justify-content:center;
}
.overlay.open { display:flex; animation:fadein 0.22s ease; }

  const svg = document.getElementById('snakeSvg');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + totalH);
  // anchor x: near the outer edge of each pill so line touches it
  const pillW = Math.min(160, W * 0.38);
  const padX  = 24;
  const pts = ENTRIES.map((_, i) => ({
    x: i % 2 === 0 ? padX + pillW : W - padX - pillW,
    y: i * ROW_H + ROW_H / 2
  }));
  let d = 'M ' + pts[0].x + ' ' + pts[0].y;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i], p1 = pts[i + 1];
    const cy = (p0.y + p1.y) / 2;
    d += ' C ' + p0.x + ' ' + cy + ', ' + p1.x + ' ' + cy + ', ' + p1.x + ' ' + p1.y;
  }
  svg.innerHTML =
    '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="#C4788A" stop-opacity="0.6"/>' +
    '<stop offset="50%" stop-color="#C4788A" stop-opacity="0.55"/>' +
    '<stop offset="100%" stop-color="#C4788A" stop-opacity="0.55"/>' +
    '</linearGradient></defs>' +
    '<path d="' + d + '" fill="none" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="5 6"/>';
});

function openModal(i) {
  const e = ENTRIES[i];
  document.getElementById('mDate').textContent = e.date;
  document.getElementById('mTitle').textContent = e.title;
  document.getElementById('mSub').textContent = e.sub || '';
  document.getElementById('puzzleQ').textContent = e.puzzle.q;
  document.getElementById('sEmoji').textContent = e.puzzle.emoji;
  document.getElementById('sText').textContent = e.puzzle.answer;
  document.getElementById('memTxt').textContent = e.memory;
  buildCollage(i);
  if (unlocked.has(i)) {
    showCollage();
  } else {
    document.getElementById('puzzleBox').style.display = 'block';
    document.getElementById('collageWrap').classList.remove('open');
    setTimeout(() => initScratch(i), 80);
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function initScratch(idx) {
  const outer  = document.getElementById('scratchOuter');
  const canvas = document.getElementById('scratchpad');
  const w = outer.offsetWidth || 230;
  const h = outer.querySelector('.scratch-bg').offsetHeight || 80;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, '#C4788A');
  g.addColorStop(1, '#7A9EB8');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(0, 0, w, h, 14); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.font = '300 11px DM Sans'; ctx.textAlign = 'center';
  ctx.fillText('✦ hier kratzen ✦', w / 2, h / 2 + 4);
  let drawing = false, done = false;
  function getPos(ev) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    const src = ev.touches ? ev.touches[0] : ev;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  }
  function erase(ev) {
    ev.preventDefault(); if (!drawing) return;
    const p = getPos(ev);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(p.x, p.y, 26, 0, Math.PI * 2); ctx.fill();
    if (!done) {
      const data = ctx.getImageData(0, 0, w, h).data;
      let c = 0; for (let j = 3; j < data.length; j += 4) { if (data[j] < 128) c++; }
      if (c / (w * h) > 0.55) { done = true; unlocked.add(idx); confetti(); setTimeout(showCollage, 600); }
    }
  }
  canvas.onmousedown = ev => { drawing = true; erase(ev); };
  canvas.onmousemove = erase; canvas.onmouseup = () => drawing = false; canvas.onmouseleave = () => drawing = false;
  canvas.ontouchstart = ev => { drawing = true; erase(ev); };
  canvas.ontouchmove = erase; canvas.ontouchend = () => drawing = false;
}

function showCollage() {
  document.getElementById('puzzleBox').style.display = 'none';
  document.getElementById('collageWrap').classList.add('open');
}

function buildCollage(i) {
  const e = ENTRIES[i];
  const grid = document.getElementById('cGrid');
  grid.className = 'c-grid ' + e.layout;
  grid.innerHTML = '';
  for (let s = 0; s < e.slots; s++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    if (e.layout === 'g-a' && s === 0) tile.classList.add('tall');
    if (e.layout === 'g-b' && s === 0) tile.classList.add('wide');
    const ph = e.ph[s] || {};
    const src = photos[i][s];
    if (src) {
      const img = document.createElement('img');
      img.src = src; img.alt = ph.l || '';
      img.onclick = () => openLb(src);
      tile.appendChild(img);
    } else {
      tile.innerHTML = '<div class="tile-ph"><span class="ph-icon">' + (ph.i || '📷') + '</span><span class="ph-lbl">' + (ph.l || 'foto') + '</span></div>';
      tile.onclick = () => { window._ut = { i, s }; document.getElementById('fileInput').click(); };
    }
    grid.appendChild(tile);
  }
  document.getElementById('fileInput').onchange = ev => {
    Array.from(ev.target.files).forEach((f, fi) => {
      const r = new FileReader();
      r.onload = ev2 => { photos[i][(window._ut ? window._ut.s : 0) + fi] = ev2.target.result; buildCollage(i); };
      r.readAsDataURL(f);
    });
    window._ut = null;
  };
}

function openLb(src) { document.getElementById('lbImg').src = src; document.getElementById('lb').classList.add('open'); }
function closeLb() { document.getElementById('lb').classList.remove('open'); }

function confetti() {
  const items = ['✈','🌍','✦','🥂','♡','💫','🗺','🌸'];
  for (let i = 0; i < 9; i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = items[i % items.length];
    el.style.left = (10 + Math.random() * 80) + '%';
    el.style.top  = (20 + Math.random() * 40) + '%';
    el.style.animationDelay = (i * 65) + 'ms';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

function openAddModal() {
  document.getElementById('addModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.body.style.overflow = '';
}
function maybeCloseAdd(e) {
  if (e.target === document.getElementById('addModal')) closeAddModal();
}

function submitNewEntry() {
  const date   = document.getElementById('newDate').value.trim();
  const title  = document.getElementById('newTitle').value.trim();
  const sub    = document.getElementById('newSub').value.trim();
  const q      = document.getElementById('newQ').value.trim();
  const answer = document.getElementById('newAnswer').value.trim();
  const emoji  = document.getElementById('newEmoji').value.trim() || '✨';
  const memory = document.getElementById('newMemory').value.trim();

  if (!date || !title) {
    // highlight missing fields
    if (!date)  document.getElementById('newDate').style.borderColor  = 'var(--rose)';
    if (!title) document.getElementById('newTitle').style.borderColor = 'var(--rose)';
    return;
  }

  const layouts = ['g-b', 'g-a', 'g-b', 'g-c'];
  const layout  = layouts[ENTRIES.length % layouts.length];
  const slots   = layout === 'g-c' ? 6 : 4;

  const entry = {
    date, title,
    sub: sub || '',
    puzzle: { q: q || 'Was war dein Lieblingsmoment?', emoji, answer: answer || '…' },
    memory: memory || '',
    layout, slots,
    ph: Array.from({ length: slots }, (_, i) => ({ i: '📷', l: 'foto ' + (i + 1) }))
  };

  ENTRIES.push(entry);
  photos.push({});

  // clear form
  ['newDate','newTitle','newSub','newQ','newAnswer','newEmoji','newMemory'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.style.borderColor = '';
  });

  closeAddModal();
  rebuildSnake();
  confetti();

  // scroll to new entry
  setTimeout(() => {
    const rows = document.querySelectorAll('.snake-row');
    const last = rows[rows.length - 1];
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 350);
}

function rebuildSnake() {
  const rowsEl = document.getElementById('snakeRows');
  rowsEl.innerHTML = '';

  ENTRIES.forEach((e, i) => {
    const side = i % 2 === 0 ? 'left' : 'right';
    const div  = document.createElement('div');
    div.className = 'snake-row side-' + side;
    div.style.height = ROW_H + 'px';
    div.innerHTML =
      '<div class="node" onclick="openModal(' + i + ')">' +
        '<div class="node-pill">' +
          '<span class="pill-date">' + e.date + '</span>' +
        '</div>' +
        '<span class="node-label">' + e.title + '</span>' +
      '</div>';
    rowsEl.appendChild(div);
  });

  // redraw SVG
  requestAnimationFrame(() => {
    const wrap  = document.getElementById('snakeWrap');
    const totalH = ENTRIES.length * ROW_H + 80;
    wrap.style.minHeight = totalH + 'px';
    const W = wrap.offsetWidth || 390;
    const svg = document.getElementById('snakeSvg');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + totalH);
    const pillW2 = Math.min(160, W * 0.38);
    const padX2  = 24;
    const pts = ENTRIES.map((_, i) => ({
      x: i % 2 === 0 ? padX2 + pillW2 : W - padX2 - pillW2,
      y: i * ROW_H + ROW_H / 2
    }));
    let d = 'M ' + pts[0].x + ' ' + pts[0].y;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i], p1 = pts[i + 1];
      const cy = (p0.y + p1.y) / 2;
      d += ' C ' + p0.x + ' ' + cy + ', ' + p1.x + ' ' + cy + ', ' + p1.x + ' ' + p1.y;
    }
    svg.innerHTML =
      '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#C4788A" stop-opacity="0.6"/>' +
      '<stop offset="50%" stop-color="#C4788A" stop-opacity="0.5"/>' +
      '<stop offset="100%" stop-color="#C4788A" stop-opacity="0.55"/>' +
      '</linearGradient></defs>' +
      '<path d="' + d + '" fill="none" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="5 6"/>';
  });
}


// ── WORLD MAP ──
const visitedCountries = new Set();

function saveVisited() {
  localStorage.setItem('visitedCountries', JSON.stringify([...visitedCountries]));
}

function loadVisited() {
  try {
    const saved = JSON.parse(localStorage.getItem('visitedCountries') || '[]');
    saved.forEach(c => visitedCountries.add(c));
  } catch(e) {}
}

async function loadMap() {
  loadVisited();
  try {
    const res = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
    const data = await res.json();
    renderMap(data);
  } catch(e) {
    document.getElementById('mapContainer').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--muted);font-family:Cormorant Garamond,serif;font-style:italic;">Karte konnte nicht geladen werden.</p>';
  }
}

function renderMap(geoData) {
  const container = document.getElementById('mapContainer');
  const W = container.offsetWidth || 340;
  const H = Math.round(W * 0.52);

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  // Simple equirectangular projection
  function project(lon, lat) {
    const x = (lon + 180) / 360 * W;
    const y = (90 - lat) / 180 * H;
    return [x, y];
  }

  function coordsToPath(coords) {
    return coords.map((ring, ri) =>
      ring.map((pt, i) => {
        const [x, y] = project(pt[0], pt[1]);
        return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ') + 'Z'
    ).join(' ');
  }

  geoData.features.forEach(feature => {
    const path = document.createElementNS(svgNS, 'path');
    let d = '';

    const geo = feature.geometry;
    if (geo.type === 'Polygon') {
      d = coordsToPath(geo.coordinates);
    } else if (geo.type === 'MultiPolygon') {
      d = geo.coordinates.map(poly => coordsToPath(poly)).join(' ');
    }

    if (!d) return;

    const name = feature.properties.name || '';
    path.setAttribute('d', d);
    path.setAttribute('data-name', name);
    path.setAttribute('title', name);

    path.addEventListener('click', () => {
      if (visitedCountries.has(name)) {
        visitedCountries.delete(name);
        path.classList.remove('visited');
      } else {
        visitedCountries.add(name);
        path.classList.add('visited');
      }
      document.getElementById('visitedCount').textContent = visitedCountries.size;
    });

    svg.appendChild(path);
  });

  // restore saved state
  svg.querySelectorAll('path').forEach(p => {
    if (visitedCountries.has(p.getAttribute('data-name'))) {
      p.classList.add('visited');
    }
  });
  container.appendChild(svg);
}

function resetMap() {
  visitedCountries.clear();
  document.querySelectorAll('#mapContainer path.visited').forEach(p => p.classList.remove('visited'));
  localStorage.removeItem('visitedCountries');
}
